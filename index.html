<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TENU - Pre Order</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f2f4f8;
}

.header {
    background: #2d6cdf;
    color: white;
    text-align: center;
    padding: 20px;
}

.card {
    background: white;
    margin: 15px;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

button {
    background: #2d6cdf;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 10px;
    width: 100%;
    font-size: 16px;
    margin-top: 10px;
}

.qty {
    display: flex;
    align-items: center;
    gap: 10px;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.wa-float {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: green;
    color: white;
    padding: 12px 15px;
    border-radius: 50px;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="header">
    <h1>TENU</h1>
    <p>Pre Order: Senin & Selasa (08:00 - 20:00)</p>
    <p>Pengiriman: Hari Rabu</p>
</div>

<div class="card">
    <h2>Cheesecuit 250 ml</h2>
    <p>Rp15.000</p>

    <div class="qty">
        <button onclick="kurang()">-</button>
        <span id="jumlah">1</span>
        <button onclick="tambah()">+</button>
    </div>

    <p>Total: Rp<span id="total">15000</span></p>
</div>

<div class="card">
    <p id="infoPengiriman"></p>

    <p>
    🔄 Reschedule maksimal hari Selasa<br>
    📩 Ajukan via WhatsApp
    </p>

    <input type="text" id="nama" placeholder="Nama Pemesan">
    <input type="text" id="alamat" placeholder="Alamat">

    <button onclick="pesan()">Pesan via WhatsApp</button>
    <button onclick="reschedule()">Reschedule Pesanan</button>
</div>

<a class="wa-float" href="https://wa.me/6285881382477?text=Halo%20TENU,%20saya%20ingin%20bertanya" target="_blank">
💬 Chat
</a>

<script>
let jumlah = 1;
const harga = 15000;

function updateTotal() {
    document.getElementById("jumlah").innerText = jumlah;
    document.getElementById("total").innerText = jumlah * harga;
}

function tambah() {
    jumlah++;
    updateTotal();
}

function kurang() {
    if (jumlah > 1) jumlah--;
    updateTotal();
}

const now = new Date();
const hari = now.toLocaleDateString('id-ID', { weekday: 'long' });

// Info pengiriman
let info = "";
if (hari === "Senin" || hari === "Selasa") {
    info = "📦 Pesanan hari ini akan dikirim hari Rabu";
} else {
    info = "❌ Order hanya buka Senin & Selasa";
}
document.getElementById("infoPengiriman").innerText = info;

// PESAN
function pesan() {
    const jam = new Date().getHours();

    if (hari !== "Senin" && hari !== "Selasa") {
        alert("Order hanya hari Senin & Selasa");
        return;
    }

    if (jam < 8 || jam > 20) {
        alert("Order hanya jam 08:00 - 20:00");
        return;
    }

    const nama = document.getElementById("nama").value;
    const alamat = document.getElementById("alamat").value;

    if (nama === "" || alamat === "") {
        alert("Isi nama dan alamat dulu");
        return;
    }

    const total = jumlah * harga;

    const pesanWA =
`Halo TENU 👋

Saya ingin order:

Nama: ${nama}
Alamat: ${alamat}
Produk: Cheesecuit 250 ml
Jumlah: ${jumlah}
Total: Rp${total}

Pengiriman: Hari Rabu`;

    window.open("https://wa.me/6285881382477?text=" + encodeURIComponent(pesanWA));
}

// RESCHEDULE
function reschedule() {
    const nama = document.getElementById("nama").value;

    if (nama === "") {
        alert("Isi nama dulu");
        return;
    }

    const pesanWA =
`Halo TENU 👋

Saya ingin RESCHEDULE pesanan:

Nama: ${nama}

Alasan:
Tanggal kirim baru:

Terima kasih 🙏`;

    window.open("https://wa.me/6285881382477?text=" + encodeURIComponent(pesanWA));
}
</script>

</body>
</html>
